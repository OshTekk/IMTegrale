# Tailscale Serve/Funnel strips these incoming headers before setting trusted values.
log_format botnote_learning_no_uri '$remote_addr [$time_local] '
                                       '$status $body_bytes_sent $request_time';

map "$server_port|$http_tailscale_funnel_request|$http_x_forwarded_for|$http_tailscale_user_login" $botnote_client_identity {
    default "peer:$remote_addr";
    ~^443\| "lan:$remote_addr";
    ~^18080\|\?1\|[^,\x20]+\| "internet:$http_x_forwarded_for";
    ~^18080\|\|[^|]*\|.+$ "tailnet:$http_tailscale_user_login";
}

map "$server_port|$http_tailscale_funnel_request|$http_tailscale_user_login" $botnote_private_ingress {
    default 0;
    ~^443\|\|$ 1;
    ~^18080\|\|.+$ 1;
}

map $server_name $botnote_global_key {
    default "botnote-global";
}

limit_req_zone $botnote_client_identity zone=botnote_auth:10m rate=6r/m;
limit_req_zone $botnote_global_key zone=botnote_auth_global:1m rate=120r/m;
limit_req_zone $botnote_client_identity zone=botnote_api:10m rate=180r/m;
limit_req_zone $botnote_global_key zone=botnote_api_global:1m rate=1800r/m;
limit_conn_zone $botnote_client_identity zone=botnote_connections:10m;
limit_conn_zone $botnote_global_key zone=botnote_connections_global:1m;

upstream botnote_backend {
    # Example topology: render this file with the values from network.env.
    server 192.168.50.18:8443;
    keepalive 16;
}

server {
    listen 192.168.50.5:443 ssl;
    listen 127.0.0.1:18080;
    http2 on;
    server_name imtegrale.example-tailnet.ts.net;

    ssl_certificate /etc/botnote-lan-https/imtegrale.example-tailnet.ts.net.crt;
    ssl_certificate_key /etc/botnote-lan-https/imtegrale.example-tailnet.ts.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_ecdh_curve X25519:secp256r1:secp384r1;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:BotNoteTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 1m;
    keepalive_timeout 65s;
    server_tokens off;
    limit_conn_status 429;
    limit_req_status 429;

    # Requests rejected while Nginx parses headers may never reach a location.
    # Keep the server-level fallback URI/referrer-free as well so a private
    # Parcours identifier cannot leak before location selection.
    access_log /var/log/nginx/botnote.access.log botnote_learning_no_uri;
    error_log /dev/null crit;

    proxy_ssl_certificate /etc/botnote-backend-mtls/client.crt;
    proxy_ssl_certificate_key /etc/botnote-backend-mtls/client.key;
    proxy_ssl_trusted_certificate /etc/botnote-backend-mtls/ca.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
    proxy_ssl_server_name on;
    proxy_ssl_name botnote-lxc.internal;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_ssl_session_reuse on;

    location = /api/v1/admin/auth/login {
        if ($botnote_private_ingress = 0) { return 404; }
        limit_conn botnote_connections 10;
        limit_conn botnote_connections_global 50;
        limit_req zone=botnote_auth burst=3 nodelay;
        limit_req zone=botnote_auth_global burst=20 nodelay;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 45s;
        proxy_send_timeout 45s;
    }

    location ~ ^/(?:api/v1/admin(?:/|$)|admin(?:/|$)) {
        if ($botnote_private_ingress = 0) { return 404; }
        limit_conn botnote_connections 30;
        limit_conn botnote_connections_global 100;
        limit_req zone=botnote_api burst=90 nodelay;
        limit_req zone=botnote_api_global burst=300 nodelay;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 45s;
        proxy_send_timeout 45s;
    }

    location ~ ^/api/v1/auth/login/(?:imt|token|passkey(?:/options)?)$ {
        limit_conn botnote_connections 15;
        limit_conn botnote_connections_global 100;
        limit_req zone=botnote_auth burst=3 nodelay;
        limit_req zone=botnote_auth_global burst=30 nodelay;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 45s;
        proxy_send_timeout 45s;
    }

    location /api/v1/events {
        limit_conn botnote_connections 5;
        limit_conn botnote_connections_global 50;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        add_header X-Accel-Buffering no always;
    }

    # Every Parcours response, including assets and source pages, passes through
    # the application authorization layer. There is intentionally no root/alias.
    # This dedicated format also keeps content IDs and search terms out of logs.
    location ~ ^/api/v1/learning(?:/|$) {
        if ($botnote_private_ingress = 0) { return 404; }
        limit_conn botnote_connections 30;
        limit_conn botnote_connections_global 200;
        limit_req zone=botnote_api burst=90 nodelay;
        limit_req zone=botnote_api_global burst=300 nodelay;
        access_log /var/log/nginx/botnote-learning.access.log botnote_learning_no_uri;
        # Nginx error-log messages cannot be given a URI-free custom format.
        # Suppress them for this location so request lines and private IDs never
        # fall back to the server-wide error log; monitor status metrics instead.
        error_log /dev/null crit;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache off;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Robots-Tag;
        proxy_hide_header Vary;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        add_header Cache-Control "private, no-store" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Vary "Cookie" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Accel-Buffering no always;
    }

    # The SPA shell is generic, but deep-link paths can carry private catalog IDs.
    # Keep those paths out of the server-wide access/error logs as well.
    location ~ ^/parcours(?:/|$) {
        if ($botnote_private_ingress = 0) { return 404; }
        limit_conn botnote_connections 30;
        limit_conn botnote_connections_global 200;
        limit_req zone=botnote_api burst=90 nodelay;
        limit_req zone=botnote_api_global burst=300 nodelay;
        access_log /var/log/nginx/botnote-parcours.access.log botnote_learning_no_uri;
        error_log /dev/null crit;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache off;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Robots-Tag;
        proxy_hide_header Vary;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        add_header Cache-Control "private, no-store" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Vary "Cookie" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location /api/ {
        limit_conn botnote_connections 30;
        limit_conn botnote_connections_global 200;
        limit_req zone=botnote_api burst=90 nodelay;
        limit_req zone=botnote_api_global burst=300 nodelay;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        limit_conn botnote_connections 30;
        limit_conn botnote_connections_global 200;
        proxy_pass https://botnote_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-BotNote-Client-Identity $botnote_client_identity;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
