#!/usr/sbin/nft -f

flush ruleset

table inet filter {
	chain input {
		type filter hook input priority filter; policy drop;

		iifname "lo" counter accept
		ct state invalid counter drop
		ct state { established, related } counter accept

		# Preserve path-MTU discovery and useful network diagnostics.
		ip protocol icmp counter accept
		ip6 nexthdr icmpv6 counter accept

		# Administrative access is key-only and restricted to known admin hosts.
		ip saddr { 192.168.50.5, 192.168.50.13, 192.168.50.17 } tcp dport 22 ct state new counter accept

		# Only the PVE mTLS reverse proxy may reach the application directly.
		ip saddr 192.168.50.5 tcp dport 8443 ct state new counter accept
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
