Unattended-Upgrade::Origins-Pattern {
    "origin=Debian,codename=${distro_codename},label=Debian";
    "origin=Debian,codename=${distro_codename}-updates,label=Debian";
    "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
    "origin=Proxmox,codename=${distro_codename},component=pve-no-subscription";
    "origin=Tailscale,codename=${distro_codename},label=Tailscale";
};

Unattended-Upgrade::AutoFixInterruptedDpkg "true";
Unattended-Upgrade::MinimalSteps "true";
Unattended-Upgrade::Remove-New-Unused-Dependencies "true";

# Proxmox kernel retirement is performed after a successful reboot and health
# check, never from the unattended-upgrades transaction itself.
Unattended-Upgrade::Remove-Unused-Kernel-Packages "false";
Unattended-Upgrade::Remove-Unused-Dependencies "false";

# A separate weekly maintenance timer handles reboots after the backup window.
Unattended-Upgrade::Automatic-Reboot "false";
Unattended-Upgrade::SyslogEnable "true";
Unattended-Upgrade::Verbose "false";
Unattended-Upgrade::Allow-downgrade "false";
